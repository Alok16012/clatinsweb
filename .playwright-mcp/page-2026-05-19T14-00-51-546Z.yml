              - heading "NEET Admit Card" [level=2] [ref=e1993]
              - paragraph [ref=e1994]: The NEET Admit Card will be released on 1st week of May on the official website of the National Testing Agency (NTA). The students are requested to visit the NTA-NEET website to download the admit card. The admit card will not be emailed or sent by post to the students. They have to reach the exam center along with the admit card or else the candidate will not be allowed to appear for the examination. In case, there is a difficulty in downloading the admit cards, students can reach out to Helpline number or email the concern to the officials at NTA.
              - heading "NEET Syllabus" [level=2] [ref=e1995]
              - paragraph [ref=e1996]: The candidates who are appearing in the NEET examination should have a thorough knowledge of the syllabus. For better preparation, the candidates should keep an eye on the syllabus, its topics, weightage, and importance. Try not to leave any topic from the NEET syllabus. NEET syllabus consists of three main subjects - Physics, Chemistry and Biology. The entire syllabus is divided into two parts, i.e., the topics covered in Physics, Chemistry, and Biology in Class 11 and Class 12.
